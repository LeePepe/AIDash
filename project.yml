name: AIDash
options:
  bundleIdPrefix: com.tianpli
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

packages:
  AIDashCore:
    path: Packages/AIDashCore
  AIDashUI:
    path: Packages/AIDashUI

targets:
  AIDashApp:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Apps/AIDashApp/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tianpli.aidash
        PRODUCT_NAME: AIDash
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_FILE: Apps/AIDashApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Apps/AIDashApp/AIDashApp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          INFOPLIST_KEY_LSUIElement[sdk=macosx*]: YES
        Release:
          INFOPLIST_KEY_LSUIElement[sdk=macosx*]: YES
    dependencies:
      - package: AIDashCore
      - package: AIDashUI

  aidash:
    type: tool
    platform: macOS
    sources:
      - path: CLI/aidash/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tianpli.aidash.cli
        PRODUCT_NAME: aidash
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: NO
    dependencies:
      - package: AIDashCore

schemes:
  AIDashApp:
    build:
      targets:
        AIDashApp: all
    run:
      config: Debug
    archive:
      config: Release
  aidash:
    build:
      targets:
        aidash: all
    run:
      config: Debug
    archive:
      config: Release
