name: AIDash
options:
  bundleIdPrefix: com.tianpli
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

packages:
  AIDashCore:
    path: Packages/AIDashCore
  AIDashUI:
    path: Packages/AIDashUI
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"

targets:
  AIDashApp:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Apps/AIDashApp/Sources
      - path: Apps/AIDashApp/Resources/com.tianpli.aidash.plist
        platform: macOS
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchAgents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tianpli.aidash
        PRODUCT_NAME: AIDash
        INFOPLIST_FILE: Apps/AIDashApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Apps/AIDashApp/AIDashApp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_LSUIElement[sdk=macosx*]: YES
    dependencies:
      - package: AIDashCore
      - package: AIDashUI

  aidash:
    type: tool
    platform: macOS
    sources:
      - path: CLI/aidash/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tianpli.aidash.cli
        PRODUCT_NAME: aidash
        SKIP_INSTALL: NO
    dependencies:
      - package: AIDashCore
      - package: swift-argument-parser
        product: ArgumentParser

  aidashTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CLI/aidash/Tests
      - path: CLI/aidash/Sources/XPCClient
      - path: CLI/aidash/Sources/ExitCode.swift
      - path: CLI/aidash/Sources/Output
    dependencies:
      - package: AIDashCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tianpli.aidash.cli.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AIDashApp:
    build:
      targets:
        AIDashApp: all
    run:
      config: Debug
    archive:
      config: Release
  aidash:
    build:
      targets:
        aidash: all
    run:
      config: Debug
    test:
      targets:
        - aidashTests
    archive:
      config: Release
