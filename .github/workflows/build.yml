name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: swiftlint (root config)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: ghcr.io/realm/swiftlint:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint (root .swiftlint.yml, strict)
        # Same config + flags as pre-commit (per-file) and pre-push (full).
        # This is the authoritative, unbypassable style gate — the only one
        # that holds against `git commit/push --no-verify`.
        run: swiftlint lint --strict --config .swiftlint.yml

  require-tests:
    name: require-tests (改代码必带测试)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute diff range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            # push to main: compare against the previous tip
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            # first push / force scenarios may lack a valid before
            if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              base="$(git rev-parse "$head~1" 2>/dev/null || echo "$head")"
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
      - name: Diff-size advisory
        run: scripts/quality/check-diff-size.sh "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}"
      - name: Require tests (blocking)
        run: scripts/quality/require-tests.sh "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}"

  build:
    name: build + test (macOS 26)
    # macos-26 runner ships Xcode 26.x (Swift 6.2), which AIDashUI requires
    # (Package.swift declares swift-tools-version: 6.2). macos-latest defaults
    # to Xcode 16.4 / Swift 6.1 and fails package resolution.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Anti-rot — frontmatter matches code
        run: scripts/hooks/check-frontmatter

      - name: Anti-rot — tasks.md in sync with spec + single-layer
        run: scripts/hooks/check-tasks-fresh

      - name: Gate — code changes must include tests
        # 改了 .swift 源码却没动任何测试文件 → 失败。逃生舱:PR 任一 commit
        # message 含 "Allow-No-Tests:"。PR 用 base..head;push-to-main 用 before..after。
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # 新分支/首次推送时 before 可能是全零;退化为只看最后一个 commit
          if ! git cat-file -e "$base" 2>/dev/null; then
            base="$head~1"
          fi
          changed="$(git diff --name-only "$base..$head")"
          src="$(echo "$changed" | grep -E '\.swift$' | grep -vE '(^|/)Tests/|Tests?\.swift$' || true)"
          tst="$(echo "$changed" | grep -E '(^|/)Tests/|Tests?\.swift$' || true)"
          if [ -n "$src" ] && [ -z "$tst" ]; then
            if git log "$base..$head" --format=%B | grep -qi '^Allow-No-Tests:'; then
              echo "⚠️ 改了源码但无测试改动;因 Allow-No-Tests: 放行。"
            else
              echo "❌ 改了源码(.swift)但无测试改动。补测试或在 commit message 写 Allow-No-Tests: <原因>"
              echo "$src"
              exit 1
            fi
          fi

      - name: Select Xcode 26 (Swift 6.2)
        # Even on macos-26 the default xcode-select may point at an older
        # Xcode; pick the highest installed Xcode_26*.app explicitly so
        # `xcodebuild` / `swift` see Swift 6.2 unconditionally.
        run: |
          set -euo pipefail
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -Vr | head -n1 || true)
          if [ -z "$XCODE_APP" ]; then
            echo "ERROR: no Xcode 26.x found on runner. Installed Xcode apps:"
            ls -d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: swift test (AIDashCore)
        run: swift test --package-path Packages/AIDashCore

      - name: Build AIDashApp (macOS)
        run: |
          xcodebuild \
            -scheme AIDashApp \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build aidash CLI (macOS)
        run: |
          xcodebuild \
            -scheme aidash \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build
