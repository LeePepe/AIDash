name: claude-review

# 自动 code review,跑在维护者本机的 self-hosted runner 上,用已登录订阅的
# 本地 `claude` CLI(不需要 ANTHROPIC_API_KEY)。
#
# 这是 main 的 required status check:job 失败(发现 critical/high)→ 本 check
# 红 → 挡住 auto-merge。
#
# 安全(public repo + self-hosted 的高危组合):
#   - 本 workflow 在 `pull_request` 上由 **base 分支的 YAML** 评估,fork 改不到。
#     因此把"是否执行 PR 代码"的判断放在这里的 job-level `if`(可信边界),
#     绝不放进被 checkout 的脚本里——脚本本身是 PR 可控内容。
#   - fork PR(head.repo != 本仓库)→ 整个执行 job 被 `if` 跳过,PR 代码一行都不在
#     本机跑。改由 fork-notice job 上报同名 check(绿),留人工 review。
#   - 仍建议在 Settings→Actions 把 outside collaborators 的 workflow 设为需人工批准。

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 同仓库分支 PR:在 self-hosted runner 上执行 review。
  # 可信边界 = 这个 `if`(来自 base 分支 YAML,fork 无法篡改)。
  claude-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, aidash-mac]
    timeout-minutes: 20
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run local claude review (gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REPO: ${{ github.repository }}
        run: scripts/ci/claude-review.sh

  # fork PR:不在本机执行任何 PR 代码。跑在 GitHub 托管 runner 上,只发提示 +
  # 让同名 check 成功上报(否则 required check 永远 pending 卡住 PR)。
  claude-review-fork:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Notice — fork PR needs manual review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body \
            "🔒 自动 review 已跳过 —— 来自 fork 的 PR 不在维护者机器上执行。请人工 review 后合并。"
